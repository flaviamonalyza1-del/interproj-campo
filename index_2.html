<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1A1A18">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Interproj Campo">
<title>Interproj — Registro de Produção</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#F5F4F0;min-height:100vh}
#app{max-width:480px;margin:0 auto;padding-bottom:40px;background:#F5F4F0;min-height:100vh}
.hdr{background:#1A1A18;color:#fff;padding:20px 20px 0}
.hdr-top{display:flex;justify-content:space-between;align-items:center}
.hdr-title{font-size:13px;font-weight:700;letter-spacing:.15em;color:#E8C547}
.hdr-badge{font-size:11px;background:#333;color:#ccc;padding:2px 8px;border-radius:20px}
.hdr-sub{font-size:18px;font-weight:500;margin:6px 0 16px;color:#fff}
.steps{display:flex;border-top:1px solid #333;padding:12px 0 16px}
.step{flex:1;display:flex;align-items:center;gap:6px;opacity:.4}
.step.active{opacity:1}.step.done{opacity:.7}
.dot{width:22px;height:22px;border-radius:50%;background:#333;color:#999;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.dot.active{background:#E8C547;color:#1A1A18}.dot.done{background:#4CAF82;color:#fff}
.slbl{font-size:11px;color:#ccc}
.ctx{display:flex;justify-content:space-between;padding:8px 16px;background:#fff;border-bottom:1px solid #E5E4E0;margin-bottom:12px}
.ctx span{font-size:12px;color:#666;font-weight:500}
.card{background:#fff;margin:0 12px 12px;border-radius:12px;padding:16px;border:1px solid #E5E4E0}
.ctitle{font-size:14px;font-weight:700;margin:0 0 16px;color:#1A1A18;text-transform:uppercase;letter-spacing:.05em}
label{display:block;font-size:11px;font-weight:700;color:#666;margin:12px 0 4px;text-transform:uppercase;letter-spacing:.05em}
select,input,textarea{width:100%;padding:11px 12px;font-size:15px;border:1.5px solid #E0DFD8;border-radius:8px;background:#FAFAF8;font-family:inherit;color:#1A1A18;appearance:none;outline:none}
textarea{resize:none;font-size:14px}
.btn-p{width:100%;padding:14px;font-size:15px;font-weight:700;background:#E8C547;color:#1A1A18;border:none;border-radius:10px;cursor:pointer;margin-top:16px}
.btn-p:disabled{background:#DDD;color:#999;cursor:not-allowed}
.btn-s{padding:14px 20px;font-size:14px;font-weight:600;background:#fff;color:#1A1A18;border:1.5px solid #E0DFD8;border-radius:10px;cursor:pointer;margin-top:16px}
.btn-add{width:calc(100% - 24px);margin:8px 12px 0;padding:12px;font-size:14px;font-weight:600;background:transparent;color:#1A1A18;border:2px dashed #D0CFC8;border-radius:10px;cursor:pointer}
.btn-rem{font-size:11px;color:#E05555;background:none;border:none;cursor:pointer;font-weight:600}
.btn-exp{width:100%;padding:13px;font-size:14px;font-weight:700;background:#1A1A18;color:#E8C547;border:none;border-radius:10px;cursor:pointer}
.btn-exp.ok{background:#4CAF82;color:#fff}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.icard{background:#fff;margin:0 12px 10px;border-radius:12px;padding:16px;border:1px solid #E5E4E0}
.inum{font-size:12px;font-weight:700;color:#999;text-transform:uppercase}
.srow{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #F0EFE8}
.sl{font-size:13px;color:#888}.sv{font-size:13px;font-weight:600;color:#1A1A18}
.si{padding:10px 0;border-top:1px solid #F0EFE8}
.si:first-child{border:none}
.sitop{display:flex;justify-content:space-between}
.siserv{font-size:14px;font-weight:600;color:#1A1A18;flex:1}
.siqtd{font-size:14px;font-weight:700;color:#1A5C3A;margin-left:12px}
.tags{display:flex;gap:8px;margin-top:4px;flex-wrap:wrap}
.tag{font-size:11px;background:#F0EFE8;color:#555;padding:2px 8px;border-radius:20px;font-weight:600}
.tago{background:#FFF8E1;color:#7A5C00}
.sucbox{background:#fff;margin:40px 20px 0;border-radius:16px;padding:32px 24px;text-align:center;border:1px solid #E5E4E0}
.sucico{width:56px;height:56px;border-radius:50%;background:#4CAF82;color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;margin:0 auto 16px}
.suctit{font-size:22px;font-weight:700;color:#1A1A18;margin-bottom:8px}
.sucsub{font-size:14px;color:#888;margin:4px 0}
.expcard{background:#fff;margin:12px 12px 0;border-radius:12px;padding:16px;border:2px solid #E8C547}
.expinfo{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.expico{font-size:24px;flex-shrink:0}
.exptit{font-size:14px;font-weight:700;color:#1A1A18;margin-bottom:2px}
.expsub{font-size:12px;color:#888}
.expdica{font-size:12px;color:#666;margin-top:10px;background:#F5F4F0;border-radius:8px;padding:8px 12px;line-height:1.5}
.rcard{background:#fff;margin:8px 12px;border-radius:10px;padding:12px;border:1px solid #E5E4E0}
.req{font-size:13px;font-weight:700;color:#1A1A18}
.rdt{font-size:12px;color:#888}
.rresp{display:block;font-size:12px;color:#666;margin:2px 0 8px}
.ritem{display:flex;gap:8px;align-items:center;padding:4px 0;border-top:1px solid #F5F4F0}
.rserv{font-size:12px;flex:1;color:#333}
.rpav{font-size:11px;color:#888}
.rqtd{font-size:12px;font-weight:700;color:#1A5C3A}
.sec{font-size:11px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.05em;padding:0 16px;margin-top:16px;display:block}
</style>
</head>
<body>
<div id="app"></div>
<script>
const EQUIPES=["ADM/APOIO","Segurança","Cobé","Ivan","Adailton e Marcelo","Wedson e Rodrigues","Poço do Elevador","Marciel e Arlindo","Manoel Gorgonho","Fachada 01","Fachada 02","Fachada 04","Fachada 05","Fachada 06","Fachada 07","Tratamento Garagens","Logística","Abastecimento","Escadas"];
const SERVICOS=["Reboco interno","Chapisco","Emestramento","Capiaço","Alvenaria interna","Alvenaria externa","Revestimento cerâmico","Contra piso","Forro","Reboco fachada","Tratamento de concreto","Serviços de liberação de gesso","Abertura de nicho","Serviços hidrossanitários","Serviços elétricos","Serviços de acabamento","Outro"];
const UNIDADES=["m²","m","un","vb","diária","pct"];
const PAVIMENTOS=["Térreo","Garagem","Pav. 1","Pav. 2","Pav. 3","Pav. 4","Pav. 5","Pav. 6","Pav. 7","Pav. 8","Pav. 9","Pav. 10","Pav. 11","Pav. 12","Pav. 13","Pav. 14","Pav. 15","Pav. 16","Pav. 17","Pav. 18","Pav. 19","Pav. 20","Pav. 21","Pav. 22","Pav. 23","Pav. 24","Pav. 25","Pav. 26","Pav. 27","Pav. 28","Cobertura","Área externa","Fachada"];
const hoje=new Date().toISOString().split("T")[0];
let S={step:0,equipe:"",data:hoje,resp:"",itens:[ni()],registros:[],exportado:false,enviado:false};
function ni(){return{id:Math.random().toString(36).slice(2),servico:"",servicoCustom:"",pavimento:"",unidade:"m²",quantidade:"",obs:""};}
function fd(d){if(!d)return"";const[y,m,dd]=d.split("-");return`${dd}/${m}/${y}`;}
function opts(arr,sel){return arr.map(v=>`<option${sel===v?" selected":""}>${v}</option>`).join("");}
function hdr(){
  const dots=["Identificação","Serviços","Resumo"].map((l,i)=>{
    const c=i===S.step?"active":i<S.step?"done":"";
    return`<div class="step ${c}"><div class="dot ${c}">${i<S.step?"✓":i+1}</div><span class="slbl">${l}</span></div>`;
  }).join("");
  return`<div class="hdr"><div class="hdr-top"><span class="hdr-title">INTERPROJ</span><span class="hdr-badge">Campo</span></div><p class="hdr-sub">Registro de Produção Diária</p><div class="steps">${dots}</div></div>`;
}
function render(){
  const app=document.getElementById("app");
  if(S.enviado){app.innerHTML=renderEnv();bindEnv();return;}
  let body="";
  if(S.step===0){
    body=`<div class="card"><p class="ctitle">Identificação</p>
      <label>Equipe</label><select id="eq"><option value="">Selecione a equipe...</option>${opts(EQUIPES,S.equipe)}</select>
      <label>Data</label><input type="date" id="dt" value="${S.data}">
      <label>Seu nome</label><input type="text" id="resp" placeholder="Quem está registrando..." value="${S.resp}">
      <button class="btn-p" id="n0" ${S.equipe&&S.data&&S.resp?"":"disabled"}>Continuar →</button></div>`;
  } else if(S.step===1){
    const ctx=`<div class="ctx"><span>${S.equipe}</span><span>${fd(S.data)}</span></div>`;
    const itens=S.itens.map((it,i)=>`<div class="icard">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span class="inum">Serviço ${i+1}</span>${S.itens.length>1?`<button class="btn-rem" data-rem="${it.id}">✕ remover</button>`:""}
      </div>
      <label>Tipo de serviço</label><select data-id="${it.id}" data-f="servico"><option value="">Selecione...</option>${opts(SERVICOS,it.servico)}</select>
      ${it.servico==="Outro"?`<label>Descreva o serviço</label><input type="text" data-id="${it.id}" data-f="servicoCustom" value="${it.servicoCustom}" placeholder="Ex: Emboço área molhada">`:""}
      <label>Pavimento / local</label><select data-id="${it.id}" data-f="pavimento"><option value="">Selecione...</option>${opts(PAVIMENTOS,it.pavimento)}</select>
      <div class="grid2">
        <div><label>Quantidade</label><input type="number" inputmode="decimal" placeholder="0" data-id="${it.id}" data-f="quantidade" value="${it.quantidade}"></div>
        <div><label>Unidade</label><select data-id="${it.id}" data-f="unidade">${opts(UNIDADES,it.unidade)}</select></div>
      </div>
      <label>Observações <span style="font-weight:400;color:#999">(opcional)</span></label>
      <input type="text" data-id="${it.id}" data-f="obs" value="${it.obs}" placeholder="Ex: apartamento 1402...">
    </div>`).join("");
    const ok=S.itens.every(i=>i.servico&&i.pavimento&&i.quantidade&&parseFloat(i.quantidade)>0);
    body=ctx+itens+`<button class="btn-add" id="addI">+ Adicionar serviço</button>
      <div style="display:flex;gap:12px;margin:16px 12px 0">
        <button class="btn-s" id="b1">← Voltar</button>
        <button class="btn-p" id="n1" style="flex:1;margin-top:0" ${ok?"":"disabled"}>Revisar →</button>
      </div>`;
  } else {
    const ctx=`<div class="ctx"><span>${S.equipe}</span><span>${fd(S.data)}</span></div>`;
    const sum=`<div class="card"><p class="ctitle">Resumo do registro</p>
      <div class="srow"><span class="sl">Responsável</span><span class="sv">${S.resp}</span></div>
      <div class="srow"><span class="sl">Equipe</span><span class="sv">${S.equipe}</span></div>
      <div class="srow"><span class="sl">Data</span><span class="sv">${fd(S.data)}</span></div>
      <div class="srow" style="border:none"><span class="sl">Serviços</span><span class="sv">${S.itens.length}</span></div></div>`;
    const servs=`<div class="card"><p class="ctitle">Serviços executados</p>
      ${S.itens.map(it=>`<div class="si"><div class="sitop">
        <span class="siserv">${it.servico==="Outro"?it.servicoCustom:it.servico}</span>
        <span class="siqtd">${it.quantidade} ${it.unidade}</span></div>
        <div class="tags"><span class="tag">${it.pavimento}</span>${it.obs?`<span class="tag tago">${it.obs}</span>`:""}</div>
      </div>`).join("")}</div>`;
    body=ctx+sum+servs+`<div style="display:flex;gap:12px;margin:0 12px">
      <button class="btn-s" id="b2">← Editar</button>
      <button class="btn-p" id="conf" style="flex:1;margin-top:0">✓ Confirmar envio</button></div>`;
  }
  app.innerHTML=hdr()+body;
  bindMain();
}
function renderEnv(){
  const total=S.registros.reduce((s,r)=>s+r.itens.length,0);
  const expBtn=`<button class="btn-exp${S.exportado?" ok":""}" id="expBtn">${S.exportado?"✓ CSV exportado":"⬇ Exportar CSV"}</button>`;
  const dica=S.exportado?`<p class="expdica">Arquivo salvo — abra no Excel ou mande por WhatsApp para a gestora.</p>`:"";
  const expCard=`<div class="expcard"><div class="expinfo"><span class="expico">📋</span>
    <div><p class="exptit">${S.registros.length} registro(s) · ${total} serviço(s)</p>
    <p class="expsub">Exporte o CSV e mande para a gestora pelo WhatsApp</p></div></div>
    ${expBtn}${dica}</div>`;
  const regs=S.registros.map(r=>`<div class="rcard">
    <div style="display:flex;justify-content:space-between"><span class="req">${r.equipe}</span><span class="rdt">${fd(r.data)}</span></div>
    <span class="rresp">${r.responsavel}</span>
    ${r.itens.map(it=>`<div class="ritem"><span class="rserv">${it.servicoFinal}</span><span class="rpav">${it.pavimento}</span><span class="rqtd">${it.quantidade} ${it.unidade}</span></div>`).join("")}
  </div>`).join("");
  return`<div class="sucbox"><div class="sucico">✓</div>
    <p class="suctit">Registro enviado!</p>
    <p class="sucsub">${S.equipe} · ${fd(S.data)}</p>
    <p class="sucsub">${S.itens.length} serviço(s) registrado(s)</p>
    <div style="margin-top:24px;display:flex;flex-direction:column;gap:12px">
      <button class="btn-p" id="novo">+ Novo registro</button>
      <button class="btn-s" id="ver">Ver registros do dia</button>
    </div></div>
    ${expCard}
    ${S.registros.length?`<span class="sec">Registros de hoje</span>${regs}`:""}`;
}
function exportCSV(){
  const rows=[["Data","Equipe","Responsavel","Servico","Pavimento","Quantidade","Unidade","Observacao"]];
  S.registros.forEach(r=>r.itens.forEach(it=>rows.push([r.data,r.equipe,r.responsavel,it.servicoFinal,it.pavimento,it.quantidade,it.unidade,it.obs||""])));
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(";")).join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=`producao_${new Date().toLocaleDateString("pt-BR").replace(/\//g,"-")}.csv`;
  a.click();URL.revokeObjectURL(url);
  S.exportado=true;render();
}
function bindMain(){
  if(S.step===0){
    const eq=document.getElementById("eq");
    const dt=document.getElementById("dt");
    const resp=document.getElementById("resp");
    const n0=document.getElementById("n0");
    if(eq)eq.onchange=e=>{S.equipe=e.target.value;if(n0)n0.disabled=!(S.equipe&&S.data&&S.resp);};
    if(dt)dt.onchange=e=>{S.data=e.target.value;if(n0)n0.disabled=!(S.equipe&&S.data&&S.resp);};
    if(resp)resp.oninput=e=>{S.resp=e.target.value;if(n0)n0.disabled=!(S.equipe&&S.data&&S.resp);};
    if(n0)n0.onclick=()=>{S.step=1;render();};
  } else if(S.step===1){
    const b1=document.getElementById("b1");
    const addI=document.getElementById("addI");
    const n1=document.getElementById("n1");
    if(b1)b1.onclick=()=>{S.step=0;render();};
    if(addI)addI.onclick=()=>{S.itens.push(ni());render();};
    if(n1)n1.onclick=()=>{S.step=2;render();};
    document.querySelectorAll("[data-rem]").forEach(b=>b.onclick=()=>{
      S.itens=S.itens.filter(i=>i.id!==b.dataset.rem);render();
    });
    // Selects: rerenderizar (muda layout quando escolhe "Outro")
    document.querySelectorAll("select[data-id][data-f]").forEach(el=>{
      el.onchange=e=>{
        const it=S.itens.find(i=>i.id===e.target.dataset.id);
        if(it){it[e.target.dataset.f]=e.target.value;render();}
      };
    });
    // Inputs de texto e número: SÓ atualiza estado, sem rerenderizar
    document.querySelectorAll("input[data-id][data-f]").forEach(el=>{
      el.oninput=e=>{
        const it=S.itens.find(i=>i.id===e.target.dataset.id);
        if(it){
          it[e.target.dataset.f]=e.target.value;
          const ok=S.itens.every(i=>i.servico&&i.pavimento&&i.quantidade&&parseFloat(i.quantidade)>0);
          const btn=document.getElementById("n1");
          if(btn)btn.disabled=!ok;
        }
      };
    });
  } else {
    const b2=document.getElementById("b2");
    const conf=document.getElementById("conf");
    if(b2)b2.onclick=()=>{S.step=1;render();};
    if(conf)conf.onclick=()=>{
      S.registros.unshift({id:Date.now(),equipe:S.equipe,data:S.data,responsavel:S.resp,
        itens:S.itens.map(i=>({...i,servicoFinal:i.servico==="Outro"?i.servicoCustom:i.servico}))});
      S.enviado=true;render();
    };
  }
}
function bindEnv(){
  const n=document.getElementById("novo");
  if(n)n.onclick=()=>{S.step=0;S.equipe="";S.data=hoje;S.resp="";S.itens=[ni()];S.enviado=false;render();};
  const v=document.getElementById("ver");if(v)v.onclick=()=>{S.enviado=false;render();};
  const e=document.getElementById("expBtn");if(e)e.onclick=exportCSV;
}
render();
</script>
</body>
</html>
